<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="0dc — 17-year-old producer from Germany. Music on Spotify, SoundCloud, and Instagram.">
    <link rel="canonical" href="https://0dc.space/">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://0dc.space/">
    <meta property="og:title" content="0DC.SPACE — 0dc | Producer &amp; artist">
    <meta property="og:description" content="0dc — 17-year-old producer from Germany. Music on Spotify, SoundCloud, and Instagram.">
    <meta property="og:image" content="https://0dc.space/og.svg">
    <meta property="og:image:type" content="image/svg+xml">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="0DC.SPACE — 0dc | Producer &amp; artist">
    <meta name="twitter:description" content="0dc — 17-year-old producer from Germany. Music on Spotify, SoundCloud, and Instagram.">
    <meta name="twitter:image" content="https://0dc.space/og.svg">
    <title>0DC.SPACE — 0dc | Producer &amp; artist</title>
    <style>

        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ff0000;
            --stroke: 4px solid var(--text);
            --shadow: 10px 10px 0 var(--text);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::selection {
            background: var(--accent);
            color: var(--bg);
        }

        body {
            background-color: var(--text);
            color: var(--text);
            font-family: Helvetica, Arial, sans-serif;
            letter-spacing: 0.02em;
            padding: 12px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            min-height: calc(100vh - 24px);
            align-content: start;
            background: var(--bg);
            border: var(--stroke);
            box-shadow: var(--shadow);
        }

        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .box {
            padding: 28px 22px 36px;
            border: 3px solid var(--text);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .accent-text { color: var(--accent); }

        .logo {
            display: flex;
            flex-direction: column;
            font-size: clamp(2.75rem, 14vw, 4.75rem);
            font-weight: 900;
            line-height: 0.82;
        }

        .logo span { display: block; }

        @media (min-width: 768px) {
            .logo {
                flex-direction: row;
                align-items: baseline;
                gap: 0.06em;
                line-height: 1;
                font-size: clamp(3.25rem, 7.5vw, 5.25rem);
            }
            .logo span { display: inline; }
        }

        .hero {
            justify-content: flex-start;
            align-items: flex-start;
            gap: 0;
            padding: 28px 22px 32px;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-bottom: var(--stroke);
        }

        @media (min-width: 768px) {
            .hero {
                padding: 32px 36px 36px;
            }
        }

        .hero .logo .accent-text { color: var(--accent); }

        h1.logo { margin: 0; }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: inline-block;
            background: var(--text);
            color: var(--bg);
            padding: 6px 12px 8px;
            border: 3px solid var(--text);
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        p { font-size: 1rem; line-height: 1.55; margin-bottom: 10px; }

        .contact-link {
            display: inline-block;
            color: var(--text);
            text-decoration: none;
            font-size: 1.2rem;
            margin-top: 10px;
            border: 3px solid var(--text);
            padding: 8px 14px;
            width: fit-content;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 800;
            background: var(--bg);
            box-shadow: 6px 6px 0 var(--text);
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .contact-link:hover {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 6px 6px 0 var(--accent);
        }

        .contact-link:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 var(--text);
        }

        .contact-link:focus-visible,
        .listen-link-btn:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 4px;
            color: var(--accent);
        }

        .issue-line {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 18px;
            padding: 14px 22px;
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1.3;
            border-bottom: var(--stroke);
            text-transform: uppercase;
            background: var(--accent);
            color: var(--bg);
        }

        .issue-line span { opacity: 0.95; }

        .issue-line .issue-accent {
            color: var(--bg);
            opacity: 1;
            font-weight: 900;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .full-width {
            grid-column: 1 / -1;
            border: none;
        }

        .content-split {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr;
            min-height: 0;
            border-top: var(--stroke);
        }

        @media (min-width: 768px) {
            .content-split {
                grid-template-columns: 1fr 1fr;
            }
            .content-split > .box:first-child {
                border-right: var(--stroke);
            }
        }

        .listen-links {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 20px;
            margin-bottom: 28px;
        }

        .listen-embed-wrap {
            display: none;
            margin-top: 24px;
        }

        .listen-embed-wrap.is-active { display: block; }

        .listen-embed {
            border: var(--stroke);
            background: var(--bg);
            overflow: hidden;
            max-width: 100%;
            box-shadow: var(--shadow);
        }

        .listen-embed iframe {
            display: block;
            width: 100%;
            height: 380px;
            border: 0;
        }

        @media (min-width: 768px) and (max-width: 1100px) {
            .listen-embed iframe { height: 320px; }
        }

        .listen-link-btn {
            display: inline-block;
            background: var(--bg);
            border: 3px solid var(--text);
            font-family: inherit;
            font-style: inherit;
            font-weight: 800;
            line-height: inherit;
            text-transform: inherit;
            letter-spacing: inherit;
            cursor: pointer;
            padding: 8px 14px;
            box-shadow: 6px 6px 0 var(--text);
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .listen-link-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 var(--text);
        }

        .listen-link-btn.is-active {
            color: var(--bg);
            background: var(--text);
            border-color: var(--text);
            box-shadow: 6px 6px 0 var(--accent);
        }

        .listen-links .contact-link {
            margin-top: 0;
        }

        .footer {
            grid-column: 1 / -1;
            padding: 18px 22px;
            font-size: 0.72rem;
            text-align: left;
            border-top: var(--stroke);
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            background: var(--bg);
        }

        .footer a {
            color: var(--text);
            margin-top: 10px;
            display: inline-block;
        }

        .footer a:hover { color: var(--accent); }

        @media print {
            body { padding: 0; }
            .contact-link:focus-visible,
            .listen-link-btn:focus-visible { outline: none; }
        }
    </style>
</head>
<body>

    <main id="main">
    <div class="grid-container">
        <div class="issue-line" aria-hidden="true">
            <span class="issue-accent">0DC</span>
            <span>//</span>
            <span>PRODUCTION</span>
            <span>//</span>
            <span>TRACKS</span>
            <span>//</span>
            <span>2026</span>
        </div>

        <div class="box full-width hero">
            <h1 class="logo">
                <span>0</span><span>D</span><span class="accent-text">C</span>
            </h1>
        </div>

        <div class="content-split">
            <div class="box" style="background-color: #eeeeee;">
                <div>
                    <h2>INFO</h2>
                    <p>0dc — I'm 17 and based in Germany. I produce music. Streams are on the right; if you need to reach me, use the email below.</p>
                </div>

                <div style="margin-top: 48px;">
                    <h3>CONTACT</h3>
                    <a href="mailto:0dc@0dc.space" class="contact-link">0dc@0dc.space</a>
                </div>
            </div>

            <div class="box" style="background-color: #ffffff;">
                <div>
                    <h2>LISTEN</h2>
                    <div class="listen-links">
                        <button type="button" class="contact-link listen-link-btn is-active" style="margin-top: 0;" data-listen="soundcloud" aria-pressed="true">SOUNDCLOUD</button>
                        <button type="button" class="contact-link listen-link-btn" style="margin-top: 0;" data-listen="spotify" aria-pressed="false">SPOTIFY</button>
                        <a href="https://instagram.com/0dc0dc0dc" class="contact-link" style="margin-top: 0;" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
                    </div>
                    <div class="listen-embed-wrap" id="listen-embed-spotify" role="region" aria-label="Spotify player">
                        <div class="listen-embed">
                            <iframe title="0dc on Spotify" loading="lazy" allow="encrypted-media; clipboard-write" src="https://open.spotify.com/embed/artist/3WW2Yufw8hh34ZX4JkS9OK?utm_source=generator"></iframe>
                        </div>
                    </div>
                    <div class="listen-embed-wrap is-active" id="listen-embed-soundcloud" role="region" aria-label="SoundCloud player">
                        <div class="listen-embed">
                            <iframe title="0dc on SoundCloud" loading="lazy" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/0dc0dc0dc&color=%23ff0000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 0DC.SPACE — ODYSSEE RECORDS<br>
            <a href="slab.html">→ alternate layout (slab)</a>
        </div>
    </div>
    </main>

    <script>
        (function () {
            var panels = {
                spotify: document.getElementById('listen-embed-spotify'),
                soundcloud: document.getElementById('listen-embed-soundcloud')
            };
            document.querySelectorAll('.listen-link-btn[data-listen]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var key = btn.getAttribute('data-listen');
                    document.querySelectorAll('.listen-link-btn[data-listen]').forEach(function (b) {
                        var on = b === btn;
                        b.classList.toggle('is-active', on);
                        b.setAttribute('aria-pressed', on ? 'true' : 'false');
                    });
                    Object.keys(panels).forEach(function (k) {
                        panels[k].classList.toggle('is-active', k === key);
                    });
                });
            });
        })();
    </script>
</body>
</html>
